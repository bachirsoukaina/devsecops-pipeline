title = "DevSecOps Pipeline - Gitleaks Configuration"

[extend]
useDefault = true

# ============================================
# RÈGLES POUR DÉTECTER NOS VULNÉRABILITÉS
# ============================================

# Règle 1: AWS Access Key
[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''AKIA[0-9A-Z]{16}'''
  tags = ["aws", "secret"]

# Règle 2: AWS Secret Key
[[rules]]
  id = "aws-secret-key"
  description = "AWS Secret Key"
  regex = '''[A-Za-z0-9/+=]{40}'''
  tags = ["aws", "secret"]

# Règle 3: JWT Secret
[[rules]]
  id = "jwt-secret"
  description = "JWT Secret"
  regex = '''jwt\.secret\s*=\s*[a-zA-Z0-9]+'''
  tags = ["jwt", "secret"]

# Règle 4: GitHub Token
[[rules]]
  id = "github-token"
  description = "GitHub Token"
  regex = '''ghp_[a-zA-Z0-9]{36}'''
  tags = ["github", "token"]

# Règle 5: Database Password
[[rules]]
  id = "database-password"
  description = "Database Password"
  regex = '''password\s*=\s*[a-zA-Z0-9!@#$%^&*()_]+'''
  tags = ["database", "password"]

# Règle 6: Generic Secret
[[rules]]
  id = "generic-secret"
  description = "Generic Secret"
  regex = '''secret\s*=\s*[a-zA-Z0-9]+'''
  tags = ["generic", "secret"]