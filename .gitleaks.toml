title = "DevSecOps Pipeline - Gitleaks Configuration"

[extend]
useDefault = true

# ============================================
# RÈGLES SPÉCIFIQUES POUR application.properties
# ============================================

# Règle 1: JWT Secret
[[rules]]
  id = "jwt-secret-hardcoded"
  description = "JWT Secret hardcoded in application.properties"
  regex = '''jwt\.secret\s*=\s*[a-zA-Z0-9]+'''
  tags = ["jwt", "secret", "hardcoded"]

# Règle 2: AWS Access Key
[[rules]]
  id = "aws-access-key-hardcoded"
  description = "AWS Access Key hardcoded"
  regex = '''AKIA[0-9A-Z]{16}'''
  tags = ["aws", "secret", "hardcoded"]

# Règle 3: AWS Secret Key
[[rules]]
  id = "aws-secret-key-hardcoded"
  description = "AWS Secret Key hardcoded"
  regex = '''[A-Za-z0-9/+=]{40}'''
  tags = ["aws", "secret", "hardcoded"]

# Règle 4: Generic Secret
[[rules]]
  id = "generic-secret"
  description = "Generic secret in properties files"
  regex = '''(secret|key|token|password)\s*=\s*[a-zA-Z0-9!@#$%^&*()_]+'''
  tags = ["secret", "hardcoded"]