name: DevSecOps Pipeline

on:
  push:
    branches: [ main, test-security-pipeline ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ============================================
  # 1. SECRET SCANNING - GitLeaks
  # ============================================
  gitleaks:
    name: 🔑 Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run GitLeaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path results.sarif

      - name: Upload GitLeaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: results.sarif

  # ============================================
  # 2. SAST - SonarQube (bloque si Quality Gate échoue)
  # ============================================
  sast:
    name: 🔍 SAST Analysis (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and Analyze with SonarCloud
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=bachirsoukaina_devsecops-pipeline \
            -Dsonar.organization=bachirsoukaina \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.coverage.exclusions=**/*Test.java \
            -Dsonar.java.binaries=target/classes \
            -DskipTests
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # IMPORTANT : pas de continue-on-error ici.
        # sonar.qualitygate.wait=true fait échouer "mvn" (donc le job)
        # si le Quality Gate sur SonarCloud est rouge (vulnérabilités, bugs, etc.)

      - name: Upload SonarQube results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-results
          path: backend/target/sonar/

  # ============================================
  # 3. SCA - OWASP Dependency Check (bloque si CVSS >= 7)
  # ============================================
  sca:
    name: 📦 Dependency Check (OWASP SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=ALL \
            -DoutputDirectory=target/owasp-reports
        working-directory: backend
        # IMPORTANT : pas de continue-on-error.
        # failBuildOnCVSS=7 fait échouer mvn (et donc le job)
        # si une dépendance a un CVE avec un score CVSS >= 7 (ex: Log4Shell = 10.0)

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: backend/target/owasp-reports/

  # ============================================
  # 4. CONTAINER SECURITY - Trivy (bloque sur CRITICAL/HIGH/MEDIUM)
  # ============================================
  trivy:
    name: 🐳 Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t demo-app:latest ./backend

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'demo-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          ignore-unfixed: false
          output: 'trivy-results.txt'
        # IMPORTANT : pas de continue-on-error.
        # exit-code 1 fait échouer le job dès qu'une vulnérabilité
        # CRITICAL, HIGH ou MEDIUM est trouvée dans l'image

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt

  # ============================================
  # 5. IAC SECURITY - Checkov (bloque sur misconfiguration)
  # ============================================
  checkov:
    name: 🏗️ IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes
          output_format: cli,sarif
          soft_fail: false
          download_external_modules: true
          log_level: WARNING
        # IMPORTANT : pas de continue-on-error.
        # soft_fail: false fait déjà échouer l'action en cas de misconfiguration,
        # mais continue-on-error annulait cet échec au niveau du job. Supprimé.

      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: results.sarif

  # ============================================
  # 6. DAST - OWASP ZAP (scan de la vraie app Spring Boot)
  # ============================================
  dast:
    name: 🌐 DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov]
    if: always()  # S'exécute même si les jobs précédents échouent, pour voir tous les résultats
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Start Spring Boot Application
        run: |
          cd backend
          nohup mvn spring-boot:run > spring-boot.log 2>&1 &
          echo "⏳ Attente du démarrage de Spring Boot..."
          for i in {1..60}; do
            if curl -s http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "✅ Spring Boot démarré avec succès !"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "❌ Spring Boot n'a pas démarré après 120s"
              cat spring-boot.log
              exit 1
            fi
            echo "⏳ Attente... ($i/60)"
            sleep 2
          done

      - name: Run OWASP ZAP Full Scan (active, sur votre app réelle)
        uses: zaproxy/action-full-scan@v0.11.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a -j'
          allow_issue_writing: false
          fail_action: true
        # IMPORTANT : pas de continue-on-error.
        # fail_action: true fait échouer le job si ZAP trouve des alertes
        # (XSS, SQLi, headers manquants, etc.) au niveau WARN ou plus

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs
          path: backend/spring-boot.log

  # ============================================
  # 7. FINAL STATUS - Résumé
  # ============================================
  summary:
    name: 📊 Security Pipeline Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov, dast]
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "📊 DevSecOps Pipeline Summary"
          echo "================================="

          if [ "${{ needs.gitleaks.result }}" == "success" ]; then
            echo "✅ GitLeaks: PASSED"
          else
            echo "❌ GitLeaks: FAILED - Secrets détectés"
          fi

          if [ "${{ needs.sast.result }}" == "success" ]; then
            echo "✅ SonarQube: PASSED"
          else
            echo "❌ SonarQube: FAILED - Quality Gate échoué (vulnérabilités/bugs détectés)"
          fi

          if [ "${{ needs.sca.result }}" == "success" ]; then
            echo "✅ OWASP SCA: PASSED"
          else
            echo "❌ OWASP SCA: FAILED - Dépendance vulnérable détectée (CVSS >= 7)"
          fi

          if [ "${{ needs.trivy.result }}" == "success" ]; then
            echo "✅ Trivy: PASSED"
          else
            echo "❌ Trivy: FAILED - Vulnérabilités conteneur détectées"
          fi

          if [ "${{ needs.checkov.result }}" == "success" ]; then
            echo "✅ Checkov: PASSED"
          else
            echo "❌ Checkov: FAILED - Mauvaise configuration IaC détectée"
          fi

          if [ "${{ needs.dast.result }}" == "success" ]; then
            echo "✅ ZAP DAST: PASSED"
          else
            echo "❌ ZAP DAST: FAILED - Vulnérabilités détectées dynamiquement (XSS, SQLi, etc.)"
          fi

          echo "================================="

          if [ "${{ needs.gitleaks.result }}" == "success" ] && \
             [ "${{ needs.sast.result }}" == "success" ] && \
             [ "${{ needs.sca.result }}" == "success" ] && \
             [ "${{ needs.trivy.result }}" == "success" ] && \
             [ "${{ needs.checkov.result }}" == "success" ] && \
             [ "${{ needs.dast.result }}" == "success" ]; then
            echo "✅ Tous les contrôles de sécurité sont PASSÉS - Pipeline peut continuer"
            exit 0
          else
            echo "❌ Contrôles de sécurité ÉCHOUÉS - Pipeline bloqué"
            echo "🚫 Déploiement bloqué en raison de violations de sécurité"
            exit 1
          fi