name: DevSecOps Pipeline

on:
  push:
    branches: [ main, test-security-pipeline ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  gitleaks:
    name: 🔑 Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run GitLeaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path results.sarif
      - name: Upload GitLeaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: results.sarif

  sast:
    name: 🔍 SAST Analysis (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and Analyze with SonarCloud
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=bachirsoukaina_devsecops-pipeline \
            -Dsonar.organization=bachirsoukaina \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.coverage.exclusions=**/*Test.java \
            -Dsonar.java.binaries=target/classes \
            -DskipTests
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload SonarQube results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-results
          path: backend/target/sonar/

  sca:
    name: 📦 Dependency Check (OWASP SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-dc-nvd-${{ github.run_id }}
          restore-keys: owasp-dc-nvd-
      - name: OWASP Dependency Check
        run: |
          for attempt in 1 2 3; do
            echo "🔄 Tentative $attempt/3..."
            if mvn org.owasp:dependency-check-maven:check \
              -DfailBuildOnCVSS=7 \
              -Dformat=ALL \
              -DoutputDirectory=target/owasp-reports \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -DnvdApiDelay=4000 \
              -DnvdMaxRetryCount=10 \
              -DnvdValidForHours=24; then
              echo "✅ Dependency Check terminé"
              exit 0
            fi
            echo "⚠️ Échec tentative $attempt, retry dans 30s..."
            sleep 30
          done
          exit 1
        working-directory: backend
      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: backend/target/owasp-reports/

  trivy:
    name: 🐳 Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t demo-app:latest ./backend
      - name: Run Trivy Scan (rapport complet)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'demo-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          ignore-unfixed: false
          output: 'trivy-results.txt'
      - name: Afficher rapport Trivy
        run: cat trivy-results.txt
      - name: Bloquer si vulnérabilités détectées
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'demo-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          ignore-unfixed: false
      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt

  checkov:
    name: 🏗️ IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes
          output_format: cli,sarif
          soft_fail: false
          download_external_modules: true
          log_level: WARNING
      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: results.sarif

  dast:
    name: 🌐 DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and Start Spring Boot
        run: |
          cd backend
          mvn clean package -DskipTests -q
          nohup java -jar target/*.jar > spring-boot.log 2>&1 &
          echo "⏳ Attente Spring Boot..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "✅ Spring Boot UP !"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Timeout"
              cat spring-boot.log
              exit 1
            fi
            echo "⏳ ($i/30)"
            sleep 2
          done
      - name: Install ZAP 2.17.0
        run: |
          wget -q https://github.com/zaproxy/zaproxy/releases/download/v2.17.0/ZAP_2.17.0_Linux.tar.gz
          tar -xzf ZAP_2.17.0_Linux.tar.gz
          sudo mv ZAP_2.17.0 /opt/zap
          echo "✅ ZAP installé"
      - name: Start ZAP daemon
        run: |
          /opt/zap/zap.sh -daemon -port 8090 \
            -config api.disablekey=true \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true > zap-daemon.log 2>&1 &
          for i in {1..30}; do
            if curl -s http://localhost:8090/JSON/core/view/version/ | grep -q "version"; then
              echo "✅ ZAP UP !"
              break
            fi
            if [ "$i" -eq 30 ]; then cat zap-daemon.log; exit 1; fi
            echo "⏳ ($i/30)"
            sleep 3
          done
      - name: ZAP Spider
        run: |
          curl -s "http://localhost:8090/JSON/spider/action/scan/?url=http://localhost:8080/api/users/search%3Fquery%3Dtest&recurse=true"
          sleep 15
      - name: ZAP Active Scan
        run: |
          SCAN_ID=$(curl -s "http://localhost:8090/JSON/ascan/action/scan/?url=http://localhost:8080/api/users/search%3Fquery%3Dtest&recurse=true" | python3 -c "import sys,json; print(json.load(sys.stdin).get('scan','0'))")
          echo "Scan ID: $SCAN_ID"
          for i in {1..40}; do
            STATUS=$(curl -s "http://localhost:8090/JSON/ascan/view/status/?scanId=$SCAN_ID" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','0'))")
            echo "⏳ Progression: $STATUS%"
            if [ "$STATUS" = "100" ]; then echo "✅ Terminé"; break; fi
            sleep 10
          done
      - name: Generate ZAP Report
        run: |
          curl -s "http://localhost:8090/OTHER/core/other/htmlreport/" > zap-report.html
          echo "📊 Résumé alertes:"
          curl -s "http://localhost:8090/JSON/alert/view/alertsSummary/" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for k,v in d.get('alertsSummary', {}).items():
              if int(v) > 0: print(f'  {k}: {v}')
          "
      - name: Bloquer si alertes High détectées
        run: |
          HIGH=$(curl -s "http://localhost:8090/JSON/alert/view/alertsByRisk/?riskId=3" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(len(d.get('alertsByRisk', [])))
          " 2>/dev/null || echo "0")
          echo "Alertes High: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "❌ $HIGH alerte(s) High détectée(s) - XSS confirmé - Pipeline bloqué"
            exit 1
          fi
          echo "✅ Aucune alerte High"
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-daemon.log
      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs
          path: backend/spring-boot.log

  summary:
    name: 📊 Security Pipeline Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov, dast]
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "📊 DevSecOps Pipeline Summary"
          echo "================================="
          if [ "${{ needs.gitleaks.result }}" == "success" ]; then echo "✅ GitLeaks: PASSED"; else echo "❌ GitLeaks: FAILED - Secrets détectés"; fi
          if [ "${{ needs.sast.result }}" == "success" ]; then echo "✅ SonarQube: PASSED"; else echo "❌ SonarQube: FAILED - Vulnérabilités détectées"; fi
          if [ "${{ needs.sca.result }}" == "success" ]; then echo "✅ OWASP SCA: PASSED"; else echo "❌ OWASP SCA: FAILED - CVE CVSS >= 7 détectée"; fi
          if [ "${{ needs.trivy.result }}" == "success" ]; then echo "✅ Trivy: PASSED"; else echo "❌ Trivy: FAILED - Vulnérabilités conteneur"; fi
          if [ "${{ needs.checkov.result }}" == "success" ]; then echo "✅ Checkov: PASSED"; else echo "❌ Checkov: FAILED - Mauvaise config IaC"; fi
          if [ "${{ needs.dast.result }}" == "success" ]; then echo "✅ ZAP DAST: PASSED"; else echo "❌ ZAP DAST: FAILED - XSS/SQLi détecté dynamiquement"; fi
          echo "================================="
          if [ "${{ needs.gitleaks.result }}" == "success" ] && \
             [ "${{ needs.sast.result }}" == "success" ] && \
             [ "${{ needs.sca.result }}" == "success" ] && \
             [ "${{ needs.trivy.result }}" == "success" ] && \
             [ "${{ needs.checkov.result }}" == "success" ] && \
             [ "${{ needs.dast.result }}" == "success" ]; then
            echo "✅ Tous les contrôles PASSÉS - Déploiement autorisé"
            exit 0
          else
            echo "❌ Contrôles ÉCHOUÉS - Déploiement BLOQUÉ"
            exit 1
          fi
