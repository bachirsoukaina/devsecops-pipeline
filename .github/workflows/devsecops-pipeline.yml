name: DevSecOps Pipeline

on:
  push:
    branches: [ main, test-security-pipeline ]
  pull_request:
    branches: [ main ]

jobs:

  # ===== 1. SECRET SCANNING =====
  gitleaks:
    name: 🔑 Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # ❌ SUPPRIMER continue-on-error: true
        # Le pipeline doit échouer si des secrets sont détectés

  # ===== 2. SAST - SONARQUBE =====
  sast:
    name: 🔍 SAST Analysis (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and Analyze with SonarCloud
        run: mvn clean verify sonar:sonar -Dsonar.projectKey=bachirsoukaina_devsecops-pipeline -Dsonar.organization=bachirsoukaina -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }} -DskipTests
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # ❌ SUPPRIMER continue-on-error: true

  # ===== 3. SCA - OWASP DEPENDENCY CHECK =====
  sca:
    name: 📦 Dependency Check (OWASP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: OWASP Dependency Check via Maven
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
        working-directory: backend
        # ❌ SUPPRIMER continue-on-error: true
        # failBuildOnCVSS=7 signifie : échoue si CVE >= 7
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
        if: always()

  # ===== 4. CONTAINER SECURITY - TRIVY =====
  trivy:
    name: 🐳 Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t demo-app:latest ./backend
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'demo-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # ⚠️ AJOUTER : échoue si des vulnérabilités sont trouvées
          ignore-unfixed: true
        # ❌ SUPPRIMER continue-on-error: true

  # ===== 5. IAC SECURITY - CHECKOV =====
  checkov:
    name: 🏗️ IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,dockerfile
          soft_fail: false  # ⚠️ AJOUTER : échoue si des violations sont trouvées
        # ❌ SUPPRIMER continue-on-error: true

  # ===== 6. DAST - OWASP ZAP =====
  dast:
    name: 🌐 DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov]
    if: success()  # ⚠️ AJOUTER : ne s'exécute que si les précédents réussissent
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Start Spring Boot
        run: |
          cd backend
          mvn spring-boot:run &
          sleep 30
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a'  # Active tous les tests
        # ❌ SUPPRIMER continue-on-error: true