name: DevSecOps Pipeline

on:
  push:
    branches: [ main, test-security-pipeline ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  gitleaks:
    name: 🔑 Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run GitLeaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path results.sarif

      - name: Upload GitLeaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: results.sarif

  sast:
    name: 🔍 SAST Analysis (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and Analyze with SonarCloud
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=bachirsoukaina_devsecops-pipeline \
            -Dsonar.organization=bachirsoukaina \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.coverage.exclusions=**/*Test.java \
            -Dsonar.java.binaries=target/classes \
            -DskipTests
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SonarQube results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-results
          path: backend/target/sonar/

  sca:
    name: 📦 Dependency Check (OWASP SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=ALL \
            -DoutputDirectory=target/owasp-reports
        working-directory: backend
        continue-on-error: true

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: backend/target/owasp-reports/

  trivy:
    name: 🐳 Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t demo-app:latest ./backend

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'demo-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          ignore-unfixed: false
        continue-on-error: true

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt

  checkov:
    name: 🏗️ IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes
          output_format: cli,sarif
          soft_fail: false
          download_external_modules: true
          log_level: WARNING
        continue-on-error: true

      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: results.sarif

  dast:
    name: 🌐 DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Active Scan
        uses: zaproxy/action-full-scan@v0.11.0
        with:
          target: 'http://testphp.vulnweb.com'
          cmd_options: '-a -j'
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  summary:
    name: 📊 Security Pipeline Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov, dast]
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "📊 DevSecOps Pipeline Summary"
          echo "================================="
          if [ "${{ needs.gitleaks.result }}" == "success" ]; then
            echo "✅ GitLeaks: PASSED"
          else
            echo "❌ GitLeaks: FAILED - Secrets detected"
          fi
          if [ "${{ needs.sast.result }}" == "success" ]; then
            echo "✅ SonarQube: PASSED"
          else
            echo "❌ SonarQube: FAILED - SQL Injection + Secrets detected"
          fi
          if [ "${{ needs.sca.result }}" == "success" ]; then
            echo "✅ OWASP SCA: PASSED"
          else
            echo "❌ OWASP SCA: FAILED - CVE-2021-44228 Log4Shell detected"
          fi
          if [ "${{ needs.trivy.result }}" == "success" ]; then
            echo "✅ Trivy: PASSED"
          else
            echo "❌ Trivy: FAILED - Container vulnerabilities detected"
          fi
          if [ "${{ needs.checkov.result }}" == "success" ]; then
            echo "✅ Checkov: PASSED"
          else
            echo "❌ Checkov: FAILED - IaC misconfigurations detected"
          fi
          if [ "${{ needs.dast.result }}" == "success" ]; then
            echo "✅ ZAP DAST: PASSED"
          else
            echo "❌ ZAP DAST: FAILED - XSS + SQLi detected dynamically"
          fi
          echo "================================="
          echo "🚫 Deployment blocked - Security violations detected"