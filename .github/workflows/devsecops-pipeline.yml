name: DevSecOps Pipeline

on:
  push:
    branches: [ main, test-security-pipeline ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  gitleaks:
    name: 🔑 Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run GitLeaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path results.sarif
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: results.sarif

  sast:
    name: 🔍 SAST Analysis (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and Analyze with SonarCloud
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=bachirsoukaina_devsecops-pipeline \
            -Dsonar.organization=bachirsoukaina \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.coverage.exclusions=**/*Test.java \
            -Dsonar.java.binaries=target/classes \
            -DskipTests
        working-directory: backend
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonarqube-results
          path: backend/target/sonar/

  sca:
    name: 📦 Dependency Check (OWASP SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=ALL \
            -DoutputDirectory=target/owasp-reports \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        working-directory: backend
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: backend/target/owasp-reports/

  trivy:
    name: 🐳 Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t demo-app:latest ./backend
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'demo-app:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          ignore-unfixed: false
          output: 'trivy-results.txt'
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt

  checkov:
    name: 🏗️ IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes
          output_format: cli,sarif
          soft_fail: false
          download_external_modules: true
          log_level: WARNING
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: results.sarif

  dast:
    name: 🌐 DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and Start Spring Boot
        run: |
          cd backend
          mvn clean package -DskipTests -q
          nohup java -jar target/*.jar > spring-boot.log 2>&1 &
          echo "Waiting for Spring Boot..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "Spring Boot started!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
      - name: Run OWASP ZAP Active Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080/api/users/search?query=test'
          cmd_options: '-a -j'
          fail_action: true
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spring-boot-logs
          path: backend/spring-boot.log

  summary:
    name: 📊 Security Pipeline Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, sast, sca, trivy, checkov, dast]
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "📊 DevSecOps Pipeline Summary"
          echo "================================="
          [ "${{ needs.gitleaks.result }}" == "success" ] && echo "✅ GitLeaks: PASSED" || echo "❌ GitLeaks: FAILED - Secrets detected"
          [ "${{ needs.sast.result }}" == "success" ] && echo "✅ SonarQube: PASSED" || echo "❌ SonarQube: FAILED - SQL Injection + Secrets"
          [ "${{ needs.sca.result }}" == "success" ] && echo "✅ OWASP SCA: PASSED" || echo "❌ OWASP SCA: FAILED - Log4Shell CVE-2021-44228"
          [ "${{ needs.trivy.result }}" == "success" ] && echo "✅ Trivy: PASSED" || echo "❌ Trivy: FAILED - Container vulnerabilities"
          [ "${{ needs.checkov.result }}" == "success" ] && echo "✅ Checkov: PASSED" || echo "❌ Checkov: FAILED - IaC misconfigurations"
          [ "${{ needs.dast.result }}" == "success" ] && echo "✅ ZAP DAST: PASSED" || echo "❌ ZAP DAST: FAILED - XSS detected"
          echo "================================="
          echo "🚫 Deployment blocked - Security violations detected"