name: Test ZAP Only

on:
  push:
    branches: [ test-security-pipeline ]
  workflow_dispatch:

jobs:
  dast:
    name: 🌐 DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and Start Spring Boot
        run: |
          cd backend
          mvn clean package -DskipTests -q
          nohup java -jar target/*.jar > spring-boot.log 2>&1 &
          echo "⏳ Attente démarrage Spring Boot..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "✅ Spring Boot UP !"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Timeout"
              cat spring-boot.log
              exit 1
            fi
            echo "⏳ ($i/30)"
            sleep 2
          done

      - name: Verify XSS endpoint
        run: |
          echo "=== Test Content-Type ==="
          curl -I "http://localhost:8080/api/users/search?query=test"
          echo "=== Test XSS payload ==="
          curl -s "http://localhost:8080/api/users/search?query=<script>alert(1)</script>"

      - name: Install ZAP
        run: |
          wget -q https://github.com/zaproxy/zaproxy/releases/download/v2.15.0/ZAP_2.15.0_Linux.tar.gz
          tar -xzf ZAP_2.15.0_Linux.tar.gz
          sudo mv ZAP_2.15.0 /opt/zap
          echo "✅ ZAP installé"

      - name: Start ZAP daemon
        run: |
          /opt/zap/zap.sh -daemon -port 8090 \
            -config api.disablekey=true \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true > zap-daemon.log 2>&1 &
          echo "⏳ Attente démarrage ZAP..."
          for i in {1..30}; do
            if curl -s http://localhost:8090/JSON/core/view/version/ | grep -q "version"; then
              echo "✅ ZAP daemon UP !"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ ZAP timeout"
              cat zap-daemon.log
              exit 1
            fi
            echo "⏳ ($i/30)"
            sleep 3
          done

      - name: ZAP Spider
        run: |
          echo "🕷️ Spider sur l'endpoint XSS..."
          curl -s "http://localhost:8090/JSON/spider/action/scan/?url=http://localhost:8080/api/users/search%3Fquery%3Dtest&recurse=true&maxChildren=10"
          sleep 10

      - name: ZAP Active Scan
        run: |
          echo "⚔️ Scan actif sur l'endpoint XSS..."
          SCAN_ID=$(curl -s "http://localhost:8090/JSON/ascan/action/scan/?url=http://localhost:8080/api/users/search%3Fquery%3Dtest&recurse=true" | python3 -c "import sys,json; print(json.load(sys.stdin).get('scan','0'))")
          echo "Scan ID: $SCAN_ID"
          for i in {1..30}; do
            STATUS=$(curl -s "http://localhost:8090/JSON/ascan/view/status/?scanId=$SCAN_ID" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','0'))")
            echo "⏳ Progression scan actif: $STATUS%"
            if [ "$STATUS" = "100" ]; then
              echo "✅ Scan actif terminé"
              break
            fi
            sleep 10
          done

      - name: Generate ZAP Report
        run: |
          curl -s "http://localhost:8090/OTHER/core/other/htmlreport/" > zap-report.html
          echo "📊 Alertes détectées:"
          curl -s "http://localhost:8090/JSON/alert/view/alertsSummary/" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          alerts = d.get('alertsSummary', {})
          for k,v in alerts.items():
              if int(v) > 0:
                  print(f'  {k}: {v}')
          "

      - name: Check for High alerts and fail if XSS detected
        run: |
          HIGH=$(curl -s "http://localhost:8090/JSON/alert/view/alertsByRisk/?riskId=3" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          alerts = d.get('alertsByRisk', [])
          print(len(alerts))
          " 2>/dev/null || echo "0")
          echo "Alertes High: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "❌ ZAP a détecté $HIGH alerte(s) High (XSS ou autre) - Pipeline bloqué"
            exit 1
          else
            echo "✅ Aucune alerte High détectée"
          fi

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-test
          path: |
            zap-report.html
            zap-daemon.log

      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs
          path: backend/spring-boot.log
